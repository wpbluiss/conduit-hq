<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conduit AI Headquarters</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0e1a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #activityFeed {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            color: #00e5ff;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            border-top: 2px solid #00e5ff;
            z-index: 1000;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            color: #00e5ff;
            padding: 10px;
            border: 2px solid #00e5ff;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .hud-section {
            text-align: center;
        }

        .agent-popup {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            border-radius: 10px;
            padding: 20px;
            max-width: 300px;
            z-index: 2000;
            display: none;
        }

        .popup-close {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            color: #ff4081;
            font-size: 20px;
        }

        @media (max-width: 768px) {
            #hud {
                font-size: 10px;
                height: 40px;
                padding: 5px;
            }

            #activityFeed {
                height: 60px;
                font-size: 10px;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <div class="hud-section">
                <div style="font-weight: bold; color: #ffd740;">🏢 CONDUIT AI HQ</div>
                <div id="currentTime"></div>
            </div>
            <div class="hud-section">
                <div>Agents Online</div>
                <div id="agentsOnline" style="color: #00e676; font-size: 20px;">6</div>
            </div>
            <div class="hud-section">
                <div>Tasks Today</div>
                <div id="tasksToday" style="color: #ff9100; font-size: 20px;">0</div>
            </div>
        </div>

        <div id="activityFeed">
            <div style="color: #ffd740; font-weight: bold; margin-bottom: 5px;">📡 LIVE ACTIVITY FEED</div>
            <div id="feedContent"></div>
        </div>

        <div id="agentPopup" class="agent-popup">
            <span class="popup-close" onclick="closePopup()">×</span>
            <div id="popupContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://mvuslmfjkkuizixjpkgl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dXNsbWZqa2t1aXppeGpwa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NzYyMDksImV4cCI6MjA4NTA1MjIwOX0.091TGkz2qxBMTRzz_YSRnOHBotHPFQFkWspp1pZ0vMg';

        // Global variables
        let game;
        let agents = [];
        let activityData = [];
        let tasksToday = 0;

        // Agent definitions
        const AGENTS = {
            HUNTER: { color: 0xff9100, emoji: '🎯', floor: 2, name: 'HUNTER', role: 'Prospecting' },
            CLOSER: { color: 0xb388ff, emoji: '📧', floor: 2, name: 'CLOSER', role: 'Prospecting' },
            STRIKER: { color: 0x00e676, emoji: '📞', floor: 3, name: 'STRIKER', role: 'Outbound Sales' },
            SCOUT: { color: 0x00e5ff, emoji: '🔭', floor: 5, name: 'SCOUT', role: 'Intelligence' },
            SAGE: { color: 0xffd740, emoji: '✍️', floor: 4, name: 'SAGE', role: 'Content & SEO' },
            WATCHDOG: { color: 0xff4081, emoji: '🐕', floor: 1, name: 'WATCHDOG', role: 'Operations' }
        };

        // Game configuration
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'gameContainer',
            backgroundColor: '#0a0e1a',
            scene: {
                preload: preload,
                create: create,
                update: update
            },
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            }
        };

        function preload() {
            // No external assets needed - we'll draw everything with graphics
        }

        function create() {
            this.cameras.main.setBackgroundColor('#0a0e1a');

            // Create starry sky
            createStarryBackground(this);

            // Create building
            createBuilding(this);

            // Create and position agents
            createAgents(this);

            // Start data fetching
            startDataFetching();

            // Update HUD
            updateHUD();

            // Handle window resize
            this.scale.on('resize', (gameSize) => {
                this.cameras.main.setViewport(0, 0, gameSize.width, gameSize.height);
            });
        }

        function update() {
            // Animate agents
            agents.forEach(agent => {
                if (agent.sprite) {
                    // Idle animation - subtle bob
                    agent.sprite.y += Math.sin(Date.now() * 0.01 + agent.bobOffset) * 0.5;

                    // Move agents occasionally
                    if (Math.random() < 0.001) {
                        moveAgentRandomly(agent);
                    }
                }
            });
        }

        function createStarryBackground(scene) {
            // Create stars
            for (let i = 0; i < 100; i++) {
                const star = scene.add.circle(
                    Math.random() * config.width,
                    Math.random() * config.height * 0.7,
                    Math.random() * 2,
                    0xffffff,
                    Math.random() * 0.8
                );
            }
        }

        function createBuilding(scene) {
            const centerX = config.width / 2;
            const buildingWidth = Math.min(600, config.width * 0.8);
            const floorHeight = 60;
            const totalHeight = floorHeight * 9; // 7 floors + ground + roof
            const startY = config.height - totalHeight - 100;

            // Building exterior
            const building = scene.add.rectangle(
                centerX, startY + totalHeight / 2,
                buildingWidth, totalHeight,
                0x222840
            );
            building.setStrokeStyle(3, 0x00e5ff);

            // Create floors
            for (let floor = 0; floor < 8; floor++) {
                const y = startY + floor * floorHeight;
                createFloor(scene, centerX, y, buildingWidth, floorHeight, floor);
            }

            // Roof elements
            const roofY = startY - 20;

            // Antenna
            scene.add.rectangle(centerX + 100, roofY - 30, 4, 60, 0xffffff);

            // Blinking light
            const light = scene.add.circle(centerX + 100, roofY - 35, 3, 0xff0000);
            scene.tweens.add({
                targets: light,
                alpha: { from: 1, to: 0.3 },
                duration: 1000,
                repeat: -1,
                yoyo: true
            });

            // Conduit AI sign
            const sign = scene.add.rectangle(centerX, roofY - 15, 200, 20, 0x00e5ff);
            const signText = scene.add.text(centerX, roofY - 15, 'CONDUIT AI', {
                fontSize: '12px',
                fill: '#000000',
                fontFamily: 'Courier New'
            });
            signText.setOrigin(0.5);

            // Trees outside
            createTree(scene, centerX - buildingWidth / 2 - 50, startY + totalHeight - 20);
            createTree(scene, centerX + buildingWidth / 2 + 50, startY + totalHeight - 20);
        }

        function createFloor(scene, centerX, y, width, height, floorNum) {
            // Floor separator
            if (floorNum > 0) {
                scene.add.line(centerX, y, -width/2, 0, width/2, 0, 0x1a1f2e).setLineWidth(2);
            }

            // Windows with glow
            const windowCount = Math.floor(width / 60);
            for (let i = 0; i < windowCount - 1; i++) {
                const windowX = centerX - width/2 + 40 + i * 60;
                const window = scene.add.rectangle(windowX, y + height/2, 30, 40, 0x2e7ddb, 0.8);

                // Window glow
                const glow = scene.add.rectangle(windowX, y + height/2, 35, 45, 0x2e7ddb, 0.3);
            }

            // Floor-specific decorations
            addFloorDecorations(scene, centerX, y, width, height, floorNum);
        }

        function addFloorDecorations(scene, centerX, y, width, height, floorNum) {
            const floorNames = [
                'LOBBY', 'OPERATIONS', 'PROSPECTING', 'OUTBOUND SALES',
                'CONTENT & SEO', 'INTELLIGENCE', 'BOARDROOM', 'CEO SUITE'
            ];

            // Floor label
            const label = scene.add.text(centerX - width/2 + 10, y + 5, floorNames[floorNum], {
                fontSize: '10px',
                fill: '#00e5ff',
                fontFamily: 'Courier New'
            });

            // Floor-specific furniture
            switch (floorNum) {
                case 0: // Lobby
                    scene.add.rectangle(centerX, y + height - 10, 40, 15, 0x8b4513); // Front desk
                    break;
                case 1: // Operations
                    for (let i = 0; i < 3; i++) {
                        scene.add.rectangle(centerX - 60 + i * 60, y + height - 15, 25, 10, 0x4a4a4a); // Desks
                    }
                    scene.add.rectangle(centerX + 120, y + height - 20, 15, 30, 0x2a2a2a); // Server rack
                    break;
                case 2: // Prospecting
                    scene.add.rectangle(centerX - 50, y + height - 15, 80, 8, 0x8b4513); // Sales board
                    for (let i = 0; i < 2; i++) {
                        scene.add.rectangle(centerX - 30 + i * 60, y + height - 15, 25, 10, 0x4a4a4a); // Desks
                    }
                    break;
                case 3: // Outbound Sales
                    scene.add.rectangle(centerX, y + height - 15, 25, 10, 0x4a4a4a); // Desk
                    scene.add.rectangle(centerX - 50, y + height - 10, 60, 5, 0x8b4513); // Call lists
                    break;
                case 4: // Content & SEO
                    scene.add.rectangle(centerX, y + height - 15, 25, 10, 0x4a4a4a); // Desk
                    scene.add.rectangle(centerX + 80, y + height - 20, 20, 35, 0x8b4513); // Bookshelf
                    break;
                case 5: // Intelligence
                    scene.add.rectangle(centerX, y + height - 15, 60, 30, 0x4a4a4a); // War room table
                    scene.add.rectangle(centerX - 80, y + height - 10, 40, 20, 0x2a2a2a); // Analysis screens
                    break;
                case 6: // Boardroom
                    scene.add.ellipse(centerX, y + height - 15, 80, 40, 0x8b4513); // Conference table
                    for (let i = 0; i < 6; i++) {
                        const angle = (i / 6) * Math.PI * 2;
                        scene.add.circle(
                            centerX + Math.cos(angle) * 35,
                            y + height - 15 + Math.sin(angle) * 15,
                            3, 0x4a4a4a
                        ); // Chairs
                    }
                    break;
                case 7: // CEO Suite
                    scene.add.rectangle(centerX, y + height - 15, 40, 20, 0x8b4513); // Executive desk
                    scene.add.rectangle(centerX + 70, y + height - 20, 30, 35, 0xffd700); // Trophy case
                    break;
            }
        }

        function createTree(scene, x, y) {
            // Tree trunk
            scene.add.rectangle(x, y, 8, 20, 0x8b4513);

            // Tree leaves
            scene.add.circle(x, y - 15, 15, 0x228b22);
            scene.add.circle(x - 8, y - 10, 10, 0x228b22);
            scene.add.circle(x + 8, y - 10, 10, 0x228b22);
        }

        function createAgents(scene) {
            Object.keys(AGENTS).forEach(key => {
                const agentData = AGENTS[key];
                const agent = createAgent(scene, agentData);
                agents.push(agent);
            });
        }

        function createAgent(scene, agentData) {
            const buildingCenterX = config.width / 2;
            const floorHeight = 60;
            const buildingStartY = config.height - floorHeight * 9 - 100;

            // Position agent on their floor
            const x = buildingCenterX + (Math.random() - 0.5) * 200;
            const y = buildingStartY + agentData.floor * floorHeight + floorHeight - 30;

            // Create agent sprite using graphics
            const agent = scene.add.container(x, y);

            // Agent body
            const body = scene.add.rectangle(0, 0, 12, 20, agentData.color);

            // Agent head
            const head = scene.add.circle(0, -12, 6, 0xffdbac);

            // Emoji above head
            const emoji = scene.add.text(0, -25, agentData.emoji, {
                fontSize: '12px'
            });
            emoji.setOrigin(0.5);

            agent.add([body, head, emoji]);

            // Make interactive
            agent.setSize(20, 40);
            agent.setInteractive();
            agent.on('pointerdown', () => showAgentPopup(agentData));

            return {
                sprite: agent,
                data: agentData,
                bobOffset: Math.random() * Math.PI * 2,
                speechBubble: null,
                currentTask: null
            };
        }

        function moveAgentRandomly(agent) {
            if (!agent.sprite) return;

            const buildingCenterX = config.width / 2;
            const buildingWidth = Math.min(600, config.width * 0.8);
            const minX = buildingCenterX - buildingWidth / 2 + 20;
            const maxX = buildingCenterX + buildingWidth / 2 - 20;

            const targetX = Phaser.Math.Between(minX, maxX);

            game.scene.scenes[0].tweens.add({
                targets: agent.sprite,
                x: targetX,
                duration: 2000,
                ease: 'Power2'
            });
        }

        function showSpeechBubble(agent, text) {
            // Remove existing speech bubble
            if (agent.speechBubble) {
                agent.speechBubble.destroy();
            }

            const scene = game.scene.scenes[0];

            // Create speech bubble
            const bubbleWidth = Math.min(150, text.length * 6 + 20);
            const bubbleHeight = 30;

            const bubble = scene.add.container(agent.sprite.x, agent.sprite.y - 40);

            const bubbleBackground = scene.add.rectangle(0, 0, bubbleWidth, bubbleHeight, 0x000000, 0.8);
            bubbleBackground.setStrokeStyle(2, 0x00e5ff);

            const bubbleText = scene.add.text(0, 0, text, {
                fontSize: '10px',
                fill: '#00e5ff',
                fontFamily: 'Courier New',
                wordWrap: { width: bubbleWidth - 10 }
            });
            bubbleText.setOrigin(0.5);

            bubble.add([bubbleBackground, bubbleText]);

            agent.speechBubble = bubble;

            // Auto remove after 5 seconds
            scene.time.delayedCall(5000, () => {
                if (agent.speechBubble) {
                    agent.speechBubble.destroy();
                    agent.speechBubble = null;
                }
            });
        }

        function showAgentPopup(agentData) {
            const popup = document.getElementById('agentPopup');
            const content = document.getElementById('popupContent');

            const recentTasks = activityData
                .filter(item => item.agent_name === agentData.name)
                .slice(0, 5);

            let tasksHtml = '';
            if (recentTasks.length > 0) {
                tasksHtml = '<h4>Recent Activities:</h4><ul>';
                recentTasks.forEach(task => {
                    tasksHtml += `<li><strong>${task.action}:</strong> ${task.description}</li>`;
                });
                tasksHtml += '</ul>';
            } else {
                tasksHtml = '<p>No recent activities</p>';
            }

            content.innerHTML = `
                <h2 style="color: ${agentData.color === 0xff9100 ? '#ff9100' :
                           agentData.color === 0xb388ff ? '#b388ff' :
                           agentData.color === 0x00e676 ? '#00e676' :
                           agentData.color === 0x00e5ff ? '#00e5ff' :
                           agentData.color === 0xffd740 ? '#ffd740' : '#ff4081'}">
                    ${agentData.emoji} ${agentData.name}
                </h2>
                <p><strong>Role:</strong> ${agentData.role}</p>
                <p><strong>Floor:</strong> ${agentData.floor}</p>
                ${tasksHtml}
            `;

            popup.style.display = 'block';
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
        }

        function closePopup() {
            document.getElementById('agentPopup').style.display = 'none';
        }

        async function fetchActivityData() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/workforce_activity_log?order=created_at.desc&limit=50`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    activityData = data;

                    // Update activity feed
                    updateActivityFeed();

                    // Update agent speech bubbles
                    updateAgentTasks();

                    // Update tasks counter
                    const today = new Date().toISOString().split('T')[0];
                    tasksToday = data.filter(item =>
                        item.created_at && item.created_at.startsWith(today)
                    ).length;

                    updateHUD();
                }
            } catch (error) {
                console.error('Error fetching activity data:', error);
            }
        }

        function updateActivityFeed() {
            const feedContent = document.getElementById('feedContent');

            let feedHtml = '';
            activityData.slice(0, 10).forEach(item => {
                const time = new Date(item.created_at).toLocaleTimeString();
                feedHtml += `<div style="margin-bottom: 3px;">
                    <span style="color: #ffd740;">[${time}]</span>
                    <span style="color: #00e5ff;">${item.agent_name}:</span>
                    ${item.action} - ${item.description}
                </div>`;
            });

            feedContent.innerHTML = feedHtml;
        }

        function updateAgentTasks() {
            agents.forEach(agent => {
                const agentActivity = activityData.find(item =>
                    item.agent_name === agent.data.name
                );

                if (agentActivity && agentActivity !== agent.currentTask) {
                    agent.currentTask = agentActivity;
                    showSpeechBubble(agent, `${agentActivity.action}: ${agentActivity.description.substring(0, 50)}...`);
                }
            });
        }

        function updateHUD() {
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString();
            document.getElementById('tasksToday').textContent = tasksToday;
        }

        function startDataFetching() {
            // Fetch immediately
            fetchActivityData();

            // Then fetch every 30 seconds
            setInterval(fetchActivityData, 30000);

            // Update HUD every second
            setInterval(updateHUD, 1000);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (game) {
                game.scale.resize(window.innerWidth, window.innerHeight);
            }
        });

        // Initialize game
        window.addEventListener('load', () => {
            game = new Phaser.Game(config);
        });
    </script>
</body>
</html>
