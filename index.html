<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Conduit AI HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c18;overflow-x:hidden;overflow-y:auto;font-family:'Press Start 2P',monospace;color:#e0e6ed;-webkit-font-smoothing:none;image-rendering:pixelated}
.hud{position:fixed;top:0;left:0;right:0;height:36px;background:rgba(8,12,24,0.95);border-bottom:2px solid #1a2040;display:flex;align-items:center;padding:0 10px;z-index:100;gap:6px}
.hud-logo{font-size:7px;color:#00e5ff;letter-spacing:1px}
.hud-dot{width:5px;height:5px;border-radius:50%;background:#00e676;box-shadow:0 0 4px #00e676;margin-left:auto}
.hud-agents{font-size:6px;color:#8892a4;margin-left:4px}
.hud-time{font-size:6px;color:#8892a4;margin-left:auto}
.scene{padding-top:40px;display:flex;flex-direction:column;align-items:center;min-height:100vh;background:linear-gradient(180deg,#080c18 0%,#0c1428 30%,#101830 60%,#141c35 100%)}
.stars{position:fixed;top:0;left:0;right:0;height:200px;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%}
.building-area{position:relative;width:340px;margin:10px auto 0;z-index:1}
.roof{height:24px;background:#1c2240;border:2px solid #2a3258;border-bottom:none;border-radius:4px 4px 0 0;display:flex;align-items:center;justify-content:center;position:relative}
.roof-text{font-size:6px;color:#00e5ff;letter-spacing:2px;text-shadow:0 0 8px rgba(0,229,255,0.4)}
.antenna{position:absolute;top:-16px;left:50%;width:2px;height:16px;background:#3a4060;transform:translateX(-50%)}
.antenna-light{position:absolute;top:-20px;left:50%;width:4px;height:4px;background:#ff1744;border-radius:50%;transform:translateX(-50%);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
.floor{height:72px;background:#161c30;border-left:2px solid #2a3258;border-right:2px solid #2a3258;position:relative;overflow:hidden;border-bottom:2px solid #222848}
.floor:nth-child(odd){background:#181e34}
.floor-label{position:absolute;top:4px;left:6px;font-size:5px;color:#00e5ff;letter-spacing:1px;z-index:5}
.floor-windows{position:absolute;top:10px;left:8px;right:8px;display:flex;gap:8px;flex-wrap:wrap}
.window{width:18px;height:22px;background:#0d1a35;border:1px solid #1a2a50;position:relative}
.window::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#1a2a50}
.window::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:1px;background:#1a2a50}
.window.lit{background:#1a3a6a;border-color:#2a5090;box-shadow:inset 0 0 6px rgba(46,125,219,0.3)}
.window.warm{background:#2a2a1a;border-color:#4a4020;box-shadow:inset 0 0 6px rgba(200,180,80,0.3)}
.desk-area{position:absolute;bottom:4px;left:10px;right:10px;height:32px}
.desk{position:absolute;bottom:0;width:32px;height:10px;background:#2a3050;border:1px solid #3a4060;border-bottom:2px solid #3a4060}
.desk-monitor{position:absolute;bottom:10px;width:10px;height:8px;background:#1a3060;border:1px solid #2a4a80;border-radius:1px 1px 0 0}
.desk-stand{position:absolute;bottom:8px;width:4px;height:3px;background:#3a4060}
.chair{position:absolute;bottom:0;width:10px;height:14px;background:#2a2040;border:1px solid #3a3060;border-radius:2px 2px 0 0}
.bookshelf{position:absolute;bottom:0;width:10px;height:40px;background:#3a2820;border:1px solid #4a3830}
.bookshelf-shelf{position:absolute;left:0;right:0;height:1px;background:#4a3830}
.book{position:absolute;width:3px;border-radius:0}
.server-rack{position:absolute;bottom:0;width:14px;height:40px;background:#1a1a2a;border:1px solid #2a2a40}
.server-led{position:absolute;width:2px;height:2px;border-radius:50%}
.led-green{background:#00e676;box-shadow:0 0 2px #00e676}
.led-red{background:#ff1744;box-shadow:0 0 2px #ff1744}
.conf-table{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:100px;height:14px;background:#3a2820;border:1px solid #4a3830;border-radius:3px}
.conf-chair{position:absolute;width:8px;height:8px;background:#2a2040;border:1px solid #3a3060;border-radius:1px}
.agent{position:absolute;bottom:4px;z-index:10;cursor:pointer;transition:left 2s ease-in-out}
.agent:hover{transform:scale(1.4);z-index:20}
.agent:hover .agent-bubble{opacity:1}
.pixel-person{position:relative;width:14px;height:22px;image-rendering:pixelated}
.p-hair{position:absolute;top:0;left:3px;width:8px;height:3px;border-radius:1px 1px 0 0}
.p-head{position:absolute;top:2px;left:3px;width:8px;height:7px;border-radius:1px}
.p-eye-l{position:absolute;top:5px;left:5px;width:2px;height:2px;background:#fff}
.p-eye-r{position:absolute;top:5px;left:8px;width:2px;height:2px;background:#fff}
.p-body{position:absolute;top:9px;left:2px;width:10px;height:7px;border-radius:1px}
.p-pants{position:absolute;top:16px;left:2px;width:10px;height:3px}
.p-foot-l{position:absolute;top:19px;left:2px;width:4px;height:3px;background:#1a1a2a;border-radius:0 0 1px 1px}
.p-foot-r{position:absolute;top:19px;left:8px;width:4px;height:3px;background:#1a1a2a;border-radius:0 0 1px 1px}
.agent-name{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:4px;color:#8892a4;white-space:nowrap;letter-spacing:0.5px}
.agent-bubble{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);background:#0c1020;border:1px solid #00e5ff;border-radius:3px;padding:2px 5px;font-size:4px;color:#00e5ff;white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:20}
.agent.working .agent-bubble{opacity:1}
.work-dot{position:absolute;top:-2px;right:-2px;width:5px;height:5px;border-radius:50%;background:#00e676;box-shadow:0 0 4px #00e676;opacity:0;transition:opacity 0.3s}
.agent.working .work-dot{opacity:1}
.ground{height:36px;background:#1a1c28;border:2px solid #2a3258;border-top:none;border-radius:0 0 4px 4px;position:relative;display:flex;align-items:flex-end;justify-content:center}
.entrance{width:36px;height:28px;background:#0c1020;border:1px solid #2a3258;border-bottom:none;border-radius:3px 3px 0 0;position:relative;display:flex;align-items:center;justify-content:center}
.entrance-text{font-size:3px;color:#505868;letter-spacing:1px}
.door-l,.door-r{position:absolute;bottom:0;width:8px;height:18px;background:#141828;border:1px solid #2a3258}
.door-l{left:5px}.door-r{right:5px}
.door-handle{position:absolute;top:50%;width:2px;height:2px;background:#4a5070;border-radius:50%}
.door-l .door-handle{right:2px}.door-r .door-handle{left:2px}
.tree{position:absolute;bottom:0}
.tree-crown{width:18px;height:18px;background:#1a4030;border-radius:50%;border:1px solid #2a5540}
.tree-trunk{width:4px;height:8px;background:#3a2a20;margin:0 auto}
.feed-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,24,0.95);border-top:2px solid #1a2040;z-index:100;padding:4px 8px;max-height:80px;overflow-y:auto}
.feed-title{font-size:5px;color:#00e5ff;letter-spacing:2px;margin-bottom:4px}
.feed-item{font-size:5px;color:#8892a4;padding:2px 0;border-bottom:1px solid rgba(26,32,64,0.5);line-height:1.6}
.feed-item b{color:#00e5ff;font-weight:normal}
.feed-item .t{color:#505868;font-size:4px;margin-left:4px}
.panel{position:fixed;top:0;right:0;width:260px;height:100%;background:rgba(12,16,28,0.97);border-left:2px solid #2a3258;transform:translateX(100%);transition:transform 0.3s;z-index:200;overflow-y:auto;padding:12px}
.panel.open{transform:translateX(0)}
.panel-close{position:absolute;top:8px;right:8px;width:20px;height:20px;background:none;border:1px solid #2a3258;color:#8892a4;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:2px;font-family:'Press Start 2P'}
.panel-name{font-size:8px;letter-spacing:1px;margin-bottom:4px}
.panel-role{font-size:5px;color:#8892a4;margin-bottom:12px}
.panel-sec{font-size:4px;color:#505868;letter-spacing:2px;margin:10px 0 6px;border-bottom:1px solid #1a2040;padding-bottom:4px}
.panel-stat{display:flex;justify-content:space-between;font-size:6px;padding:4px 0}
.panel-stat span:last-child{color:#00e676}
.panel-log{font-size:5px;color:#8892a4;padding:4px 0;border-bottom:1px solid rgba(26,32,64,0.3);line-height:1.5}
.idle-anim{animation:idle 2s ease-in-out infinite}
@keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@media(max-width:360px){.building-area{width:310px}}
</style>
</head>
<body>

<div class="hud">
  <span class="hud-logo">CONDUIT AI HQ</span>
  <div class="hud-dot"></div>
  <span class="hud-agents">6 ONLINE</span>
  <span class="hud-time" id="clock">--:--</span>
</div>

<div class="scene">
  <div class="stars" id="stars"></div>
  <div class="building-area">
    <div class="antenna-light"></div>
    <div class="antenna"></div>
    <div class="roof"><span class="roof-text">CONDUIT AI</span></div>
    <div id="floors"></div>
    <div class="ground">
      <div class="tree" style="position:absolute;left:10px;bottom:4px"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
      <div class="entrance"><span class="entrance-text">ENTER</span><div class="door-l"><div class="door-handle"></div></div><div class="door-r"><div class="door-handle"></div></div></div>
      <div class="tree" style="position:absolute;right:10px;bottom:4px"><div class="tree-crown"></div><div class="tree-trunk"></div></div>
    </div>
  </div>
  <div style="height:90px"></div>
</div>

<div class="feed-bar">
  <div class="feed-title">LIVE ACTIVITY</div>
  <div id="feed"></div>
</div>

<div class="panel" id="panel">
  <button class="panel-close" onclick="closePanel()">x</button>
  <div id="panelContent"></div>
</div>

<script>
var FLOORS=[
  {id:'ceo',label:'CEO SUITE',agents:[]},
  {id:'board',label:'BOARDROOM',agents:[]},
  {id:'intel',label:'INTELLIGENCE',agents:['SCOUT']},
  {id:'content',label:'CONTENT',agents:['SAGE']},
  {id:'outbound',label:'OUTBOUND',agents:['STRIKER']},
  {id:'sales',label:'SALES',agents:['HUNTER','CLOSER']},
  {id:'ops',label:'OPERATIONS',agents:['WATCHDOG']},
];

var AGENTS={
  HUNTER:{role:'Director of Prospecting',color:'#ff9100',skin:'#d4956a',hair:'#4a3020',pants:'#3a2a1a'},
  CLOSER:{role:'Director of Outreach',color:'#b388ff',skin:'#e8c4a0',hair:'#2a1a10',pants:'#2a2040'},
  STRIKER:{role:'Director of Outbound',color:'#00e676',skin:'#c49a6a',hair:'#1a1a1a',pants:'#1a2a1a'},
  SCOUT:{role:'Director of Intelligence',color:'#00e5ff',skin:'#d4b08a',hair:'#3a2a20',pants:'#1a2540'},
  SAGE:{role:'Director of Content',color:'#ffd740',skin:'#d4a070',hair:'#5a4030',pants:'#3a3020'},
  WATCHDOG:{role:'Director of Operations',color:'#ff4081',skin:'#8a6040',hair:'#1a1010',pants:'#2a1520'},
};

var agentEls={}, feedEl=document.getElementById('feed');

// Stars
var starsEl=document.getElementById('stars');
for(var i=0;i<50;i++){var s=document.createElement('div');s.className='star';var sz=Math.random()>0.7?2:1;s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;opacity:'+(0.2+Math.random()*0.5);starsEl.appendChild(s)}

// Build floors
var floorsEl=document.getElementById('floors');
FLOORS.forEach(function(fl,fi){
  var f=document.createElement('div');
  f.className='floor';
  f.innerHTML='<div class="floor-label">'+fl.label+'</div>';
  
  // Windows
  var whtml='<div class="floor-windows">';
  for(var w=0;w<6;w++){
    var cls=Math.random()>0.4?(Math.random()>0.5?'lit':'warm'):'';
    whtml+='<div class="window '+cls+'"></div>';
  }
  whtml+='</div>';
  f.innerHTML+=whtml;
  
  // Furniture per floor type
  var dhtml='<div class="desk-area">';
  if(fl.id==='ops'){
    dhtml+='<div class="desk" style="left:20px"><div class="desk-monitor" style="left:11px"></div><div class="desk-stand" style="left:14px"></div></div>';
    dhtml+='<div class="chair" style="left:36px"></div>';
    dhtml+='<div class="desk" style="left:80px"><div class="desk-monitor" style="left:11px"></div></div>';
    dhtml+='<div class="server-rack" style="right:10px"><div class="server-led led-green" style="top:6px;left:3px"></div><div class="server-led led-green" style="top:6px;left:8px"></div><div class="server-led led-red" style="top:12px;left:3px"></div><div class="server-led led-green" style="top:12px;left:8px"></div><div class="server-led led-green" style="top:18px;left:3px"></div><div class="server-led led-green" style="top:18px;left:8px"></div></div>';
  } else if(fl.id==='sales'){
    dhtml+='<div class="desk" style="left:20px"><div class="desk-monitor" style="left:11px"></div></div><div class="chair" style="left:36px"></div>';
    dhtml+='<div class="desk" style="left:100px"><div class="desk-monitor" style="left:11px"></div></div><div class="chair" style="left:116px"></div>';
    dhtml+='<div style="position:absolute;bottom:2px;right:20px;width:50px;height:8px;background:#2a2a1a;border:1px solid #3a3a2a;font-size:3px;color:#505030;display:flex;align-items:center;justify-content:center;letter-spacing:1px">SALES BOARD</div>';
  } else if(fl.id==='outbound'){
    dhtml+='<div class="desk" style="left:60px"><div class="desk-monitor" style="left:11px"></div></div><div class="chair" style="left:76px"></div>';
    dhtml+='<div style="position:absolute;bottom:16px;left:20px;width:8px;height:6px;background:#2a3050;border:1px solid #3a4060;border-radius:1px"></div>';
  } else if(fl.id==='content'){
    dhtml+='<div class="desk" style="left:50px"><div class="desk-monitor" style="left:11px"></div></div><div class="chair" style="left:66px"></div>';
    dhtml+='<div class="bookshelf" style="right:20px"><div class="bookshelf-shelf" style="top:10px"></div><div class="bookshelf-shelf" style="top:20px"></div><div class="bookshelf-shelf" style="top:30px"></div><div class="book" style="top:2px;left:1px;height:8px;background:#cc4444"></div><div class="book" style="top:2px;left:4px;height:7px;background:#4488cc"></div><div class="book" style="top:12px;left:1px;height:7px;background:#44aa44"></div><div class="book" style="top:12px;left:5px;height:8px;background:#cc8844"></div><div class="book" style="top:22px;left:2px;height:7px;background:#8844cc"></div></div>';
  } else if(fl.id==='intel'){
    dhtml+='<div class="desk" style="left:40px"><div class="desk-monitor" style="left:11px"></div></div><div class="chair" style="left:56px"></div>';
    dhtml+='<div class="desk" style="left:120px"><div class="desk-monitor" style="left:11px"></div></div>';
    dhtml+='<div style="position:absolute;bottom:2px;right:15px;width:40px;height:26px;background:#0d1a30;border:1px solid #1a2a50;display:flex;align-items:center;justify-content:center;font-size:3px;color:#1a3a60">MAP</div>';
  } else if(fl.id==='board'){
    dhtml+='<div class="conf-table"></div>';
    for(var ch=0;ch<3;ch++){
      dhtml+='<div class="conf-chair" style="bottom:22px;left:'+(90+ch*30)+'px"></div>';
      dhtml+='<div class="conf-chair" style="bottom:0px;left:'+(90+ch*30)+'px"></div>';
    }
  } else if(fl.id==='ceo'){
    dhtml+='<div class="desk" style="left:60px;width:40px"><div class="desk-monitor" style="left:15px"></div></div><div class="chair" style="left:80px;height:16px"></div>';
  }
  dhtml+='</div>';
  f.innerHTML+=dhtml;
  
  // Agents
  fl.agents.forEach(function(name,idx){
    var ag=AGENTS[name];
    var el=document.createElement('div');
    el.className='agent idle-anim';
    el.style.left=(40+idx*80)+'px';
    el.style.animationDelay=(idx*0.3)+'s';
    el.onclick=function(e){e.stopPropagation();openPanel(name)};
    el.innerHTML='<div class="work-dot"></div><div class="agent-bubble" id="bub-'+name+'"></div><div class="pixel-person">'+
      '<div class="p-hair" style="background:'+ag.hair+'"></div>'+
      '<div class="p-head" style="background:'+ag.skin+'"></div>'+
      '<div class="p-eye-l"></div><div class="p-eye-r"></div>'+
      '<div class="p-body" style="background:'+ag.color+'"></div>'+
      '<div class="p-pants" style="background:'+ag.pants+'"></div>'+
      '<div class="p-foot-l"></div><div class="p-foot-r"></div>'+
      '</div><div class="agent-name">'+name+'</div>';
    f.appendChild(el);
    agentEls[name]=el;
  });
  
  floorsEl.appendChild(f);
});

// Supabase connection
var SB_URL='https://mvuslmfjkkuizixjpkgl.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dXNsbWZqa2t1aXppeGpwa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NzYyMDksImV4cCI6MjA4NTA1MjIwOX0.091TGkz2qxBMTRzz_YSRnOHBotHPFQFkWspp1pZ0vMg';
var lastActivities={};

async function fetchActivities(){
  try{
    var r=await fetch(SB_URL+'/rest/v1/workforce_activity_log?select=agent_name,action,description,created_at&order=created_at.desc&limit=20',{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(r.ok){
      var data=await r.json();
      // Update feed
      feedEl.innerHTML='';
      data.slice(0,8).forEach(function(a){
        var t=new Date(a.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
        var d=document.createElement('div');
        d.className='feed-item';
        d.innerHTML='<b>'+a.agent_name+'</b> '+a.description.substring(0,60)+'<span class="t">'+t+'</span>';
        feedEl.appendChild(d);
      });
      // Update agent bubbles with latest activity
      var agentLatest={};
      data.forEach(function(a){
        if(!agentLatest[a.agent_name]) agentLatest[a.agent_name]=a;
      });
      Object.keys(agentLatest).forEach(function(name){
        var bub=document.getElementById('bub-'+name);
        var el=agentEls[name];
        if(bub&&el){
          var desc=agentLatest[name].description;
          if(desc!==lastActivities[name]){
            bub.textContent=desc.substring(0,50);
            el.classList.add('working');
            lastActivities[name]=desc;
            setTimeout(function(){el.classList.remove('working')},5000);
          }
        }
      });
    }
  }catch(e){console.error('Supabase fetch error:',e)}
}

// Agent movement
function moveAgents(){
  Object.keys(agentEls).forEach(function(name){
    var el=agentEls[name];
    if(el&&Math.random()>0.6){
      var cur=parseInt(el.style.left)||40;
      var newX=Math.max(10,Math.min(280,cur+(Math.random()*60-30)));
      el.style.left=newX+'px';
    }
  });
}

// Panel
function openPanel(name){
  var ag=AGENTS[name];
  var latest=lastActivities[name]||'Standing by...';
  var html='<div class="panel-name" style="color:'+ag.color+'">'+name+'</div>';
  html+='<div class="panel-role">'+ag.role+'</div>';
  html+='<div class="panel-sec">STATUS</div>';
  html+='<div class="panel-stat"><span>Status</span><span>ACTIVE</span></div>';
  html+='<div class="panel-stat"><span>Department</span><span style="color:'+ag.color+'">'+ag.role.split(' ').pop()+'</span></div>';
  html+='<div class="panel-sec">CURRENT TASK</div>';
  html+='<div class="panel-log">'+latest+'</div>';
  html+='<div class="panel-sec">RECENT ACTIVITY</div>';
  html+='<div class="panel-log">Loading from Supabase...</div>';
  document.getElementById('panelContent').innerHTML=html;
  document.getElementById('panel').classList.add('open');
  
  // Fetch agent-specific activity
  fetch(SB_URL+'/rest/v1/workforce_activity_log?select=description,created_at&agent_name=eq.'+name+'&order=created_at.desc&limit=5',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(r){return r.json()}).then(function(data){
    var logsHtml='';
    data.forEach(function(a){
      var t=new Date(a.created_at).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
      logsHtml+='<div class="panel-log">'+a.description.substring(0,80)+'<br><span style="color:#505868;font-size:4px">'+t+'</span></div>';
    });
    var secs=document.querySelectorAll('.panel-sec');
    if(secs.length>=3){
      var logContainer=secs[2].nextElementSibling;
      if(logContainer) logContainer.outerHTML=logsHtml||'<div class="panel-log">No activity yet</div>';
    }
  }).catch(function(){});
}
function closePanel(){document.getElementById('panel').classList.remove('open')}

// Clock
setInterval(function(){
