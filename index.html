<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conduit AI Headquarters</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a237e;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45px;
            background: linear-gradient(180deg, rgba(26,35,126,0.95) 0%, rgba(13,18,63,0.95) 100%);
            color: #00e5ff;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            font-size: 11px;
            border-bottom: 2px solid #00e5ff;
            box-shadow: 0 2px 10px rgba(0,229,255,0.3);
        }

        .hud-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hud-title {
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 8px #00e5ff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #activityFeed {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: linear-gradient(0deg, rgba(26,35,126,0.95) 0%, rgba(13,18,63,0.95) 100%);
            color: #00e5ff;
            font-size: 9px;
            padding: 8px 15px;
            overflow: hidden;
            border-top: 2px solid #00e5ff;
            box-shadow: 0 -2px 10px rgba(0,229,255,0.3);
            z-index: 1000;
        }

        .feed-title {
            color: #00e5ff;
            font-weight: bold;
            margin-bottom: 4px;
            text-shadow: 0 0 4px #00e5ff;
        }

        .feed-content {
            height: 42px;
            overflow: hidden;
            color: #b3e5fc;
        }

        .feed-item {
            margin-bottom: 2px;
            white-space: nowrap;
            animation: scrollUp 0.5s ease-in-out;
        }

        @keyframes scrollUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .no-data {
            color: #64b5f6;
            font-style: italic;
        }

        .agent-popup {
            position: absolute;
            background: linear-gradient(135deg, rgba(26,35,126,0.98) 0%, rgba(13,18,63,0.98) 100%);
            color: #00e5ff;
            border: 2px solid #00e5ff;
            border-radius: 8px;
            padding: 15px;
            width: 220px;
            min-height: 160px;
            z-index: 2000;
            display: none;
            font-size: 10px;
            box-shadow: 0 4px 20px rgba(0,229,255,0.4);
            backdrop-filter: blur(10px);
        }

        .popup-close {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            color: #ff4081;
            font-size: 18px;
            font-weight: bold;
        }

        .popup-close:hover {
            color: #ff6ec7;
        }

        @media (max-width: 768px) {
            #hud {
                height: 40px;
                font-size: 10px;
                padding: 0 10px;
            }
            .hud-title {
                font-size: 12px;
            }
            #activityFeed {
                height: 55px;
                font-size: 8px;
                padding: 6px 10px;
            }
            .agent-popup {
                width: 200px;
                min-height: 140px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <div class="hud-section">
                <span class="hud-title">CONDUIT AI HQ</span>
            </div>
            <div class="hud-section">
                <div class="status-dot"></div>
                <span id="agentCount">6 Agents Online</span>
            </div>
            <div class="hud-section">
                <span id="currentTime">--:--</span>
            </div>
        </div>

        <div id="activityFeed">
            <div class="feed-title">LIVE ACTIVITY FEED</div>
            <div class="feed-content" id="feedContent">
                <div class="no-data">Connecting to agent network...</div>
            </div>
        </div>

        <div id="agentPopup" class="agent-popup">
            <span class="popup-close" onclick="closePopup()">×</span>
            <div id="popupContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://mvuslmfjkkuizixjpkgl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dXNsbWZqa2t1aXppeGpwa2dsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0NzYyMDksImV4cCI6MjA4NTA1MjIwOX0.091TGkz2qxBMTRzz_YSRnOHBotHPFQFkWspp1pZ0vMg';

        // Global variables
        let game;
        let agents = [];
        let activityData = [];
        let tasksToday = 0;

        // Agent definitions with exact hex colors
        const AGENTS = {
            HUNTER: {
                color: 0xff9100,
                shirtColor: '#ff9100',
                floor: 1, // OPS
                name: 'HUNTER',
                role: 'Lead Generation',
                skinColor: '#d4956a',
                pantsColor: '#2c2c54',
                hairColor: '#40407a',
                shoeColor: '#1a1a1a'
            },
            CLOSER: {
                color: 0xb388ff,
                shirtColor: '#b388ff',
                floor: 2, // SALES
                name: 'CLOSER',
                role: 'Sales Conversion',
                skinColor: '#e8c4a0',
                pantsColor: '#2c2c54',
                hairColor: '#5f27cd',
                shoeColor: '#1a1a1a'
            },
            STRIKER: {
                color: 0x00e676,
                shirtColor: '#00e676',
                floor: 3, // OUTBOUND
                name: 'STRIKER',
                role: 'Outbound Sales',
                skinColor: '#c49a6a',
                pantsColor: '#2c2c54',
                hairColor: '#2f3542',
                shoeColor: '#1a1a1a'
            },
            SCOUT: {
                color: 0x00e5ff,
                shirtColor: '#00e5ff',
                floor: 5, // INTEL
                name: 'SCOUT',
                role: 'Market Intelligence',
                skinColor: '#d4b08a',
                pantsColor: '#2c2c54',
                hairColor: '#3c6382',
                shoeColor: '#1a1a1a'
            },
            SAGE: {
                color: 0xffd740,
                shirtColor: '#ffd740',
                floor: 4, // CONTENT
                name: 'SAGE',
                role: 'Content Strategy',
                skinColor: '#d4a070',
                pantsColor: '#2c2c54',
                hairColor: '#f39800',
                shoeColor: '#1a1a1a'
            },
            WATCHDOG: {
                color: 0xff4081,
                shirtColor: '#ff4081',
                floor: 1, // OPS
                name: 'WATCHDOG',
                role: 'Operations Monitor',
                skinColor: '#c8956a',
                pantsColor: '#2c2c54',
                hairColor: '#e55039',
                shoeColor: '#1a1a1a'
            }
        };

        // Game configuration
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'gameContainer',
            backgroundColor: '#1a237e',
            scene: {
                preload: preload,
                create: create,
                update: update
            },
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            render: {
                pixelArt: true,
                antialias: false
            }
        };

        function preload() {
            // No external assets needed - using graphics API only
        }

        function create() {
            this.cameras.main.setBackgroundColor('#1a237e');

            // Create starfield background
            createStarfield(this);

            // Create the main building
            createBuilding(this);

            // Create all agents
            createAgents(this);

            // Start real-time data fetching
            startDataFetching();

            // Initialize HUD
            updateHUD();

            // Handle clicks for popup dismissal
            this.input.on('pointerdown', (pointer, currentlyOver) => {
                if (currentlyOver.length === 0) {
                    closePopup();
                }
            });

            // Handle window resize
            this.scale.on('resize', (gameSize) => {
                this.cameras.main.setViewport(0, 0, gameSize.width, gameSize.height);
                this.scene.restart();
            });
        }

        function update() {
            // Animate agents with subtle movements
            agents.forEach(agent => {
                if (agent.sprite && agent.sprite.active) {
                    // Idle breathing animation
                    const time = Date.now() * 0.001;
                    agent.sprite.y = agent.baseY + Math.sin(time + agent.bobOffset) * 0.5;

                    // Random movement occasionally
                    if (Math.random() < 0.0005) {
                        moveAgentRandomly(agent);
                    }
                }
            });
        }

        function createStarfield(scene) {
            // Create animated starfield background
            for (let i = 0; i < 60; i++) {
                const star = scene.add.circle(
                    Math.random() * config.width,
                    Math.random() * (config.height - 110), // Avoid HUD areas
                    Math.random() > 0.5 ? 1 : 0.5,
                    0xffffff,
                    Math.random() * 0.8 + 0.2
                );

                // Twinkling animation
                scene.tweens.add({
                    targets: star,
                    alpha: { from: 0.2, to: 1 },
                    duration: 2000 + Math.random() * 3000,
                    repeat: -1,
                    yoyo: true,
                    ease: 'Sine.easeInOut'
                });
            }
        }

        function createBuilding(scene) {
            const centerX = config.width / 2;
            const maxWidth = Math.min(375, config.width - 40); // Mobile-first, max 375px
            const buildingWidth = maxWidth;
            const floorHeight = 70;
            const totalFloors = 8;
            const totalHeight = floorHeight * totalFloors;
            const buildingY = config.height - 120 - totalHeight; // Leave space for activity feed

            // Main building structure
            const building = scene.add.graphics();

            // Building main body with depth
            building.fillStyle(0x283593);
            building.fillRect(centerX - buildingWidth/2, buildingY, buildingWidth, totalHeight);

            // 3D depth effect - left side
            building.fillStyle(0x1e2749);
            building.fillRect(centerX - buildingWidth/2 - 6, buildingY + 6, 6, totalHeight);

            // 3D depth effect - top
            building.fillStyle(0x3949ab);
            building.fillRect(centerX - buildingWidth/2 - 6, buildingY, buildingWidth + 6, 6);

            // Clean building outline
            building.lineStyle(1, 0x5c6bc0);
            building.strokeRect(centerX - buildingWidth/2, buildingY, buildingWidth, totalHeight);

            // Create each floor with precise details
            const floorNames = ['LOBBY', 'OPS', 'SALES', 'OUTBOUND', 'CONTENT', 'INTEL', 'BOARD', 'CEO'];

            for (let floor = 0; floor < totalFloors; floor++) {
                createFloor(scene, centerX, buildingY + floor * floorHeight, buildingWidth, floorHeight, floor, floorNames[floor]);
            }

            // Rooftop elements
            createRooftop(scene, centerX, buildingY - 30, buildingWidth);

            // Ground level and entrance
            createEntrance(scene, centerX, buildingY + totalHeight, buildingWidth);
        }

        function createFloor(scene, centerX, y, width, height, floorNum, floorName) {
            const graphics = scene.add.graphics();

            // Clean 1px floor separator line
            if (floorNum > 0) {
                graphics.lineStyle(1, 0x5c6bc0);
                graphics.lineBetween(centerX - width/2, y, centerX + width/2, y);
            }

            // Floor label with better positioning
            const label = scene.add.text(centerX - width/2 + 12, y + 8, floorName, {
                fontSize: '8px',
                fill: '#00e5ff',
                fontFamily: 'Courier New, monospace',
                fontWeight: 'bold'
            });

            // Create windows with cross pattern detail
            const windowSpacing = 45;
            const windowCount = Math.floor((width - 80) / windowSpacing);
            const windowStartX = centerX - (windowCount * windowSpacing) / 2;

            for (let i = 0; i < windowCount; i++) {
                const windowX = windowStartX + i * windowSpacing;
                const windowY = y + height / 2;
                const isLit = Math.random() > 0.4; // 60% chance of being lit
                createWindow(scene, windowX, windowY, isLit);
            }

            // Add floor-specific furniture
            addFloorFurniture(scene, centerX, y, width, height, floorNum);
        }

        function createWindow(scene, x, y, isLit) {
            const graphics = scene.add.graphics();

            // Window background
            graphics.fillStyle(isLit ? 0xfff59d : 0x1a237e);
            graphics.fillRect(x - 8, y - 10, 16, 20);

            // Window frame
            graphics.lineStyle(1, 0x37474f);
            graphics.strokeRect(x - 8, y - 10, 16, 20);

            // Cross pattern (4 window panes)
            graphics.lineStyle(1, 0x37474f);
            // Vertical divider
            graphics.lineBetween(x, y - 10, x, y + 10);
            // Horizontal divider
            graphics.lineBetween(x - 8, y, x + 8, y);

            // Warm glow effect for lit windows
            if (isLit) {
                const glow = scene.add.circle(x, y, 12, 0xfff59d, 0.2);

                // Subtle glow animation
                scene.tweens.add({
                    targets: glow,
                    alpha: { from: 0.1, to: 0.3 },
                    duration: 3000 + Math.random() * 2000,
                    repeat: -1,
                    yoyo: true
                });
            }
        }

        function addFloorFurniture(scene, centerX, y, width, height, floorNum) {
            const furniture = scene.add.graphics();

            switch (floorNum) {
                case 0: // LOBBY
                    // Reception desk
                    createDesk(scene, centerX, y + height - 25, 40, 12, 0x8d6e63);
                    // Lobby chairs
                    createChair(scene, centerX - 60, y + height - 20, 0x424242);
                    createChair(scene, centerX + 60, y + height - 20, 0x424242);
                    break;

                case 1: // OPS
                    // Server rack
                    furniture.fillStyle(0x263238);
                    furniture.fillRect(centerX + width/3, y + height - 35, 12, 30);
                    // Server status lights
                    for (let i = 0; i < 6; i++) {
                        furniture.fillStyle(Math.random() > 0.5 ? 0x4caf50 : 0xf44336);
                        furniture.fillCircle(centerX + width/3 + 6, y + height - 30 + i * 4, 1);
                    }
                    // Work desks
                    createDesk(scene, centerX - 40, y + height - 25);
                    createDesk(scene, centerX + 20, y + height - 25);
                    break;

                case 2: // SALES
                    // Sales board
                    furniture.fillStyle(0x5d4037);
                    furniture.fillRect(centerX - 50, y + 15, 100, 20);
                    furniture.lineStyle(1, 0x8d6e63);
                    furniture.strokeRect(centerX - 50, y + 15, 100, 20);
                    // Desks
                    createDesk(scene, centerX - 50, y + height - 25);
                    createDesk(scene, centerX + 30, y + height - 25);
                    break;

                case 3: // OUTBOUND
                    createDesk(scene, centerX - 20, y + height - 25);
                    // Phone system
                    furniture.fillStyle(0x37474f);
                    furniture.fillRect(centerX + 40, y + height - 30, 20, 15);
                    break;

                case 4: // CONTENT
                    createDesk(scene, centerX - 30, y + height - 25);
                    // Bookshelf
                    createBookshelf(scene, centerX + 60, y + height - 35);
                    break;

                case 5: // INTEL
                    // Strategic planning table (oval)
                    furniture.fillStyle(0x5d4037);
                    furniture.fillEllipse(centerX, y + height - 20, 80, 25);
                    furniture.lineStyle(1, 0x8d6e63);
                    furniture.strokeEllipse(centerX, y + height - 20, 80, 25);
                    break;

                case 6: // BOARD
                    // Executive conference table
                    createConferenceTable(scene, centerX, y + height - 25, 100, 20);
                    // Executive chairs around table
                    const chairPositions = [
                        {x: centerX - 60, y: y + height - 25},
                        {x: centerX - 30, y: y + height - 40},
                        {x: centerX + 30, y: y + height - 40},
                        {x: centerX + 60, y: y + height - 25},
                        {x: centerX - 30, y: y + height - 10},
                        {x: centerX + 30, y: y + height - 10}
                    ];
                    chairPositions.forEach(pos => {
                        createChair(scene, pos.x, pos.y, 0x1b5e20);
                    });
                    break;

                case 7: // CEO
                    // Executive desk (larger)
                    createDesk(scene, centerX, y + height - 25, 50, 16, 0x4e342e);
                    // Executive chair
                    createChair(scene, centerX, y + height - 5, 0x1b5e20);
                    // Executive monitor (larger)
                    furniture.fillStyle(0x263238);
                    furniture.fillRect(centerX - 10, y + height - 45, 20, 15);
                    break;
            }
        }

        function createDesk(scene, x, y, w = 30, h = 10, color = 0x5d4037) {
            const desk = scene.add.graphics();

            // Desktop
            desk.fillStyle(color);
            desk.fillRect(x - w/2, y - h/2, w, h);

            // Desktop edge highlight
            desk.fillStyle(Phaser.Display.Color.Interpolate.ColorWithColor(
                Phaser.Display.Color.IntegerToColor(color),
                {r: 255, g: 255, b: 255},
                100, 20
            ).color);
            desk.fillRect(x - w/2, y - h/2, w, 2);

            // Legs
            desk.fillStyle(0x3e2723);
            desk.fillRect(x - w/2 + 2, y + h/2, 3, 8);
            desk.fillRect(x + w/2 - 5, y + h/2, 3, 8);

            // Monitor
            desk.fillStyle(0x263238);
            desk.fillRect(x - 6, y - h/2 - 12, 12, 10);

            // Monitor stand
            desk.fillStyle(0x37474f);
            desk.fillRect(x - 2, y - h/2, 4, 2);
        }

        function createChair(scene, x, y, color = 0x424242) {
            const chair = scene.add.graphics();

            // Seat
            chair.fillStyle(color);
            chair.fillRect(x - 6, y - 6, 12, 8);

            // Backrest
            chair.fillStyle(Phaser.Display.Color.Interpolate.ColorWithColor(
                Phaser.Display.Color.IntegerToColor(color),
                {r: 0, g: 0, b: 0},
                100, 20
            ).color);
            chair.fillRect(x - 6, y - 14, 12, 8);
        }

        function createBookshelf(scene, x, y) {
            const shelf = scene.add.graphics();

            // Shelf frame
            shelf.fillStyle(0x5d4037);
            shelf.fillRect(x - 6, y, 12, 30);

            // Shelves
            shelf.fillStyle(0x4e342e);
            for (let i = 0; i < 4; i++) {
                shelf.fillRect(x - 6, y + i * 8, 12, 1);

                // Books
                for (let j = 0; j < 8; j++) {
                    const bookColors = [0xe53935, 0x43a047, 0x1e88e5, 0xfb8c00, 0x8e24aa, 0x00acc1];
                    shelf.fillStyle(bookColors[j % bookColors.length]);
                    shelf.fillRect(x - 5 + j * 1.2, y + i * 8 + 1, 1, 6);
                }
            }
        }

        function createConferenceTable(scene, x, y, w, h) {
            const table = scene.add.graphics();

            // Table top
            table.fillStyle(0x5d4037);
            table.fillRect(x - w/2, y - h/2, w, h);

            // Table edge highlight
            table.fillStyle(0x8d6e63);
            table.fillRect(x - w/2, y - h/2, w, 2);

            // Table legs
            table.fillStyle(0x3e2723);
            const legPositions = [
                {x: x - w/2 + 8, y: y + h/2},
                {x: x + w/2 - 8, y: y + h/2}
            ];
            legPositions.forEach(leg => {
                table.fillRect(leg.x - 2, leg.y, 4, 6);
            });
        }

        function createRooftop(scene, centerX, y, width) {
            const roof = scene.add.graphics();

            // Roof structure
            roof.fillStyle(0x37474f);
            roof.fillRect(centerX - width/2, y, width, 20);

            // Roof edge
            roof.fillStyle(0x546e7a);
            roof.fillRect(centerX - width/2, y, width, 3);

            // Communication array
            roof.fillStyle(0x90a4ae);
            roof.fillRect(centerX - 2, y - 25, 4, 25);

            // Satellite dish
            roof.fillStyle(0xbdbdbd);
            roof.fillCircle(centerX, y - 30, 8);
            roof.fillStyle(0x90a4ae);
            roof.fillCircle(centerX, y - 30, 6);

            // Warning light
            const warningLight = scene.add.circle(centerX + 20, y - 5, 3, 0xff1744);
            scene.tweens.add({
                targets: warningLight,
                alpha: { from: 1, to: 0.2 },
                duration: 800,
                repeat: -1,
                yoyo: true
            });

            // Rooftop logo
            const logo = scene.add.text(centerX, y - 15, 'CONDUIT', {
                fontSize: '8px',
                fill: '#00e5ff',
                fontFamily: 'Courier New, monospace',
                fontWeight: 'bold'
            });
            logo.setOrigin(0.5);
        }

        function createEntrance(scene, centerX, y, width) {
            const entrance = scene.add.graphics();

            // Ground level platform
            entrance.fillStyle(0x455a64);
            entrance.fillRect(centerX - width/2, y, width, 25);

            // Entrance doors
            entrance.fillStyle(0x263238);
            entrance.fillRect(centerX - 20, y - 30, 40, 30);

            // Door frames
            entrance.lineStyle(2, 0x37474f);
            entrance.strokeRect(centerX - 20, y - 30, 40, 30);

            // Door handles
            entrance.fillStyle(0xbdbdbd);
            entrance.fillCircle(centerX - 8, y - 15, 2);
            entrance.fillCircle(centerX + 8, y - 15, 2);

            // Entrance sign
            const entranceSign = scene.add.text(centerX, y - 40, 'CONDUIT AI HEADQUARTERS', {
                fontSize: '9px',
                fill: '#00e5ff',
                fontFamily: 'Courier New, monospace',
                fontWeight: 'bold'
            });
            entranceSign.setOrigin(0.5);

            // Steps
            entrance.fillStyle(0x546e7a);
            entrance.fillRect(centerX - 25, y - 5, 50, 5);
            entrance.fillRect(centerX - 30, y, 60, 5);
        }

        function createAgents(scene) {
            agents = []; // Reset agents array

            Object.keys(AGENTS).forEach(agentKey => {
                const agentData = AGENTS[agentKey];
                const agent = createAgent(scene, agentData);
                agents.push(agent);
            });
        }

        function createAgent(scene, agentData) {
            const centerX = config.width / 2;
            const maxWidth = Math.min(375, config.width - 40);
            const buildingWidth = maxWidth;
            const floorHeight = 70;
            const buildingY = config.height - 120 - (floorHeight * 8);

            // Calculate agent position on their assigned floor
            const floorY = buildingY + (agentData.floor * floorHeight) + floorHeight - 35;
            const agentX = centerX + (Math.random() - 0.5) * (buildingWidth - 80);

            // Create agent sprite using Phaser graphics (16x24 pixels exactly)
            const agentGraphics = scene.add.graphics();

            // Draw precise 16x24 pixel character
            drawPixelPerson(agentGraphics, 0, 0, agentData);

            // Convert to container for easier manipulation
            const agentContainer = scene.add.container(agentX, floorY);
            agentContainer.add(agentGraphics);

            // Add name label
            const nameText = scene.add.text(0, 16, agentData.name, {
                fontSize: '7px',
                fill: agentData.shirtColor,
                fontFamily: 'Courier New, monospace',
                fontWeight: 'bold'
            });
            nameText.setOrigin(0.5);
            agentContainer.add(nameText);

            // Make interactive
            agentContainer.setSize(16, 30);
            agentContainer.setInteractive();
            agentContainer.on('pointerdown', () => showAgentPopup(agentData));

            return {
                sprite: agentContainer,
                data: agentData,
                baseY: floorY,
                bobOffset: Math.random() * Math.PI * 2,
                speechBubble: null,
                currentTask: null
            };
        }

        function drawPixelPerson(graphics, x, y, agentData) {
            // 16x24 pixel precise character

            // Shoes (2px high, 6px wide each)
            graphics.fillStyle(agentData.shoeColor);
            graphics.fillRect(x - 7, y + 10, 6, 2); // Left shoe
            graphics.fillRect(x + 1, y + 10, 6, 2);  // Right shoe

            // Pants/Legs (8px high, 14px wide)
            graphics.fillStyle(agentData.pantsColor);
            graphics.fillRect(x - 7, y + 2, 14, 8);

            // Shirt/Torso (6px high, 12px wide)
            graphics.fillStyle(agentData.shirtColor);
            graphics.fillRect(x - 6, y - 4, 12, 6);

            // Arms (extending from shirt)
            graphics.fillStyle(agentData.shirtColor);
            graphics.fillRect(x - 8, y - 2, 2, 4); // Left arm
            graphics.fillRect(x + 6, y - 2, 2, 4);  // Right arm

            // Hands
            graphics.fillStyle(agentData.skinColor);
            graphics.fillRect(x - 8, y + 2, 2, 2); // Left hand
            graphics.fillRect(x + 6, y + 2, 2, 2);  // Right hand

            // Head (8px wide, 8px high)
            graphics.fillStyle(agentData.skinColor);
            graphics.fillRect(x - 4, y - 12, 8, 8);

            // Hair (8px wide, 3px high)
            graphics.fillStyle(agentData.hairColor);
            graphics.fillRect(x - 4, y - 15, 8, 3);

            // Eyes (2px each, white with black pupils)
            graphics.fillStyle(0xffffff);
            graphics.fillRect(x - 3, y - 10, 2, 2); // Left eye
            graphics.fillRect(x + 1, y - 10, 2, 2);  // Right eye

            // Eye pupils
            graphics.fillStyle(0x000000);
            graphics.fillRect(x - 2, y - 9, 1, 1); // Left pupil
            graphics.fillRect(x + 2, y - 9, 1, 1);  // Right pupil
        }

        function moveAgentRandomly(agent) {
            if (!agent.sprite || !agent.sprite.active) return;

            const centerX = config.width / 2;
            const maxWidth = Math.min(375, config.width - 40);
            const buildingWidth = maxWidth;
            const minX = centerX - buildingWidth/2 + 40;
            const maxX = centerX + buildingWidth/2 - 40;

            const targetX = Phaser.Math.Between(minX, maxX);

            // Face direction of movement
            const movingRight = targetX > agent.sprite.x;
            agent.sprite.scaleX = movingRight ? 1 : -1;

            // Smooth movement animation
            const scene = game.scene.scenes[0];
            scene.tweens.add({
                targets: agent.sprite,
                x: targetX,
                duration: 2500 + Math.random() * 1500,
                ease: 'Power2'
            });
        }

        function showSpeechBubble(agent, text) {
            if (!agent.sprite || !agent.sprite.active) return;

            // Remove existing bubble
            if (agent.speechBubble) {
                agent.speechBubble.destroy();
                agent.speechBubble = null;
            }

            const scene = game.scene.scenes[0];
            const bubbleWidth = Math.min(100, text.length * 3 + 20);

            // Create speech bubble container
            const bubble = scene.add.container(agent.sprite.x, agent.sprite.y - 30);

            // Bubble background
            const bg = scene.add.graphics();
            bg.fillStyle(0xffffff, 0.95);
            bg.fillRoundedRect(-bubbleWidth/2, -12, bubbleWidth, 20, 6);
            bg.lineStyle(1, 0x424242);
            bg.strokeRoundedRect(-bubbleWidth/2, -12, bubbleWidth, 20, 6);

            // Speech bubble pointer
            bg.fillStyle(0xffffff);
            bg.fillTriangle(0, -2, -4, 6, 4, 6);

            // Bubble text
            const bubbleText = scene.add.text(0, -2, text, {
                fontSize: '7px',
                fill: '#000000',
                fontFamily: 'Courier New, monospace',
                align: 'center',
                wordWrap: { width: bubbleWidth - 8 }
            });
            bubbleText.setOrigin(0.5);

            bubble.add([bg, bubbleText]);
            agent.speechBubble = bubble;

            // Auto-remove after 5 seconds
            scene.time.delayedCall(5000, () => {
                if (agent.speechBubble) {
                    agent.speechBubble.destroy();
                    agent.speechBubble = null;
                }
            });
        }

        function showAgentPopup(agentData) {
            const popup = document.getElementById('agentPopup');
            const content = document.getElementById('popupContent');

            // Filter recent tasks for this agent
            const recentTasks = activityData
                .filter(item => item.agent_name === agentData.name)
                .slice(0, 4);

            let statusColor = '#4caf50';
            let statusText = 'ACTIVE';

            if (recentTasks.length === 0) {
                statusColor = '#ff9800';
                statusText = 'STANDBY';
            }

            let tasksHtml = `<div style="color: ${statusColor}; margin: 8px 0; font-weight: bold;">● ${statusText}</div>`;

            if (recentTasks.length > 0) {
                tasksHtml += '<div style="margin-top: 10px; font-size: 9px; color: #00e5ff;">Recent Activity:</div>';
                recentTasks.forEach(task => {
                    const timeAgo = getTimeAgo(new Date(task.created_at));
                    tasksHtml += `<div style="font-size: 8px; color: #b3e5fc; margin: 3px 0; padding: 2px 0; border-bottom: 1px solid #1e2749;">
                        ${task.action.substring(0, 35)}${task.action.length > 35 ? '...' : ''}
                        <span style="color: #64b5f6; float: right;">${timeAgo}</span>
                    </div>`;
                });
            }

            content.innerHTML = `
                <div style="color: ${agentData.shirtColor}; font-weight: bold; margin-bottom: 8px; font-size: 12px;">
                    ${agentData.name}
                </div>
                <div style="color: #90caf9; font-size: 9px; margin-bottom: 8px;">
                    Role: ${agentData.role}
                </div>
                ${tasksHtml}
            `;

            // Position popup at center of screen
            popup.style.display = 'block';
            popup.style.left = '50%';
            popup.style.top = '50%';
            popup.style.transform = 'translate(-50%, -50%)';
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);

            if (diffInSeconds < 60) return 'now';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
            return `${Math.floor(diffInSeconds / 86400)}d ago`;
        }

        function closePopup() {
            document.getElementById('agentPopup').style.display = 'none';
        }

        // Supabase API functions
        async function fetchActivityData() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/workforce_activity_log?order=created_at.desc&limit=50`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    activityData = data;
                    updateActivityFeed();
                    updateAgentTasks();
                    updateHUD();
                } else {
                    console.log('API response not ok:', response.status);
                }
            } catch (error) {
                console.error('Error fetching activity data:', error);
                // Show offline status in HUD
                document.getElementById('agentCount').textContent = '6 Agents (Offline)';
            }
        }

        function updateActivityFeed() {
            const feedContent = document.getElementById('feedContent');

            if (activityData.length === 0) {
                feedContent.innerHTML = '<div class="no-data">Waiting for agent activity...</div>';
                return;
            }

            let feedHtml = '';
            const recentItems = activityData.slice(0, 6); // Show latest 6 items

            recentItems.forEach(item => {
                const timestamp = new Date(item.created_at).toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const agentData = AGENTS[item.agent_name];
                const agentColor = agentData ? agentData.shirtColor : '#00e5ff';

                feedHtml += `<div class="feed-item">
                    <span style="color: ${agentColor}; font-weight: bold;">[${item.agent_name}]</span>
                    ${item.action}
                    <span style="color: #64b5f6; float: right;">${timestamp}</span>
                </div>`;
            });

            feedContent.innerHTML = feedHtml;
        }

        function updateAgentTasks() {
            agents.forEach(agent => {
                // Find most recent activity for this agent
                const recentActivity = activityData.find(item =>
                    item.agent_name === agent.data.name
                );

                if (recentActivity && recentActivity !== agent.currentTask) {
                    agent.currentTask = recentActivity;

                    // Show speech bubble with recent action
                    const shortAction = recentActivity.action.length > 25
                        ? recentActivity.action.substring(0, 25) + '...'
                        : recentActivity.action;

                    showSpeechBubble(agent, shortAction);
                }
            });
        }

        function updateHUD() {
            // Update time
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit'
            });

            // Update agent count
            const activeAgents = activityData.length > 0
                ? new Set(activityData.map(item => item.agent_name)).size
                : 6;

            document.getElementById('agentCount').textContent = `${activeAgents} Agents Online`;
        }

        function startDataFetching() {
            // Initial fetch
            fetchActivityData();

            // Set up recurring fetches every 30 seconds
            setInterval(fetchActivityData, 30000);

            // Update HUD every second
            setInterval(updateHUD, 1000);
        }

        // Window resize handler
        window.addEventListener('resize', () => {
            if (game) {
                game.scale.resize(window.innerWidth, window.innerHeight);
            }
        });

        // Initialize the game
        window.addEventListener('load', () => {
            game = new Phaser.Game(config);
        });
    </script>
</body>
</html>
