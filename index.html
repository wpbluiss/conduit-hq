<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Conduit AI — Headquarters</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--sky1:#0a0e1a;--sky2:#131b2e;--bldg:#1a1f2e;--bldg2:#222840;--floor:#2a3150;--wall:#1e2440;--win:#0d3b6e;--winlit:#2e7ddb;--cyan:#00e5ff;--green:#00e676;--orange:#ff9100;--red:#ff1744;--purple:#b388ff;--yellow:#ffd740;--pink:#ff4081;--text:#e0e6ed;--text2:#8892a4;--text3:#505868;--dark:#0c101c}
html,body{height:100%;overflow:hidden;background:var(--sky1);font-family:'Courier New',monospace;color:var(--text);touch-action:none}
.world{width:100%;height:100%;position:relative;overflow:hidden}
.sky{position:absolute;inset:0;background:linear-gradient(180deg,#050810 0%,#0a1628 40%,#162040 70%,#1a2545 100%)}
.stars{position:absolute;inset:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%}
.building-wrap{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:380px}
.building{position:relative;width:100%}
.roof{height:30px;background:linear-gradient(180deg,#2a3358,var(--bldg));border-radius:6px 6px 0 0;position:relative;border:1px solid #333a55;border-bottom:none;display:flex;align-items:center;justify-content:center}
.roof-sign{font-size:8px;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.5)}
.antenna{position:absolute;top:-20px;left:50%;width:2px;height:20px;background:#555;transform:translateX(-50%)}
.antenna::after{content:'';position:absolute;top:-3px;left:-2px;width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.floor{height:72px;background:var(--bldg);border-left:2px solid #333a55;border-right:2px solid #333a55;position:relative;overflow:hidden}
.floor:nth-child(even){background:var(--bldg2)}
.floor-base{height:3px;background:#333a55;width:100%}
.floor-label{position:absolute;left:4px;top:3px;font-size:7px;letter-spacing:1px;color:var(--text3)}
.dept-label{position:absolute;right:4px;top:3px;font-size:7px;letter-spacing:1px;color:var(--cyan);text-align:right}
.windows{position:absolute;bottom:8px;left:8px;right:8px;display:flex;gap:4px;flex-wrap:wrap}
.win{width:14px;height:18px;border-radius:1px;background:var(--win);border:1px solid #1a4a80}
.win.lit{background:var(--winlit);box-shadow:0 0 6px rgba(46,125,219,0.4)}
.desk{position:absolute;bottom:6px;width:28px;height:10px;background:#3a4060;border-radius:2px 2px 0 0;border:1px solid #4a5070;border-bottom:none}
.chair{position:absolute;bottom:4px;width:10px;height:8px;background:#4a3060;border-radius:2px 2px 0 0}
.pixel-agent{position:absolute;bottom:6px;width:16px;height:24px;cursor:pointer;transition:left 2s ease-in-out;z-index:10;image-rendering:pixelated}
.pixel-agent:hover{transform:scale(1.3);z-index:20}
.agent-sprite{width:16px;height:24px;position:relative}
.sp-head{position:absolute;top:0;left:3px;width:10px;height:10px;border-radius:3px}
.sp-body{position:absolute;top:10px;left:2px;width:12px;height:10px;border-radius:1px}
.sp-leg1{position:absolute;top:20px;left:3px;width:4px;height:4px;border-radius:0 0 1px 1px}
.sp-leg2{position:absolute;top:20px;left:9px;width:4px;height:4px;border-radius:0 0 1px 1px}
.sp-icon{position:absolute;top:-2px;left:50%;transform:translateX(-50%);font-size:8px}
.agent-name{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:6px;white-space:nowrap;color:var(--text2);letter-spacing:0.5px}
.work-bubble{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:var(--dark);border:1px solid var(--cyan);border-radius:4px;padding:2px 5px;font-size:6px;color:var(--cyan);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;opacity:0;transition:opacity 0.3s;pointer-events:none}
.pixel-agent:hover .work-bubble{opacity:1}
.pixel-agent.working .work-bubble{opacity:1}
.ground{height:40px;background:linear-gradient(180deg,#1a2030,#141825);border-top:2px solid #333a55;position:relative;display:flex;align-items:center;justify-content:center}
.entrance{width:40px;height:30px;background:#0d1520;border-radius:4px 4px 0 0;border:1px solid #333a55;border-bottom:none;position:relative;display:flex;align-items:center;justify-content:center}
.entrance-text{font-size:5px;color:var(--text3);letter-spacing:1px}
.door{width:12px;height:20px;background:#1a2540;border:1px solid #2a3a60;position:absolute;bottom:0}
.door:first-of-type{left:6px}
.door:last-of-type{right:6px}
.lobby-desk{position:absolute;left:60px;bottom:8px;width:30px;height:10px;background:#3a4060;border-radius:2px;border:1px solid #4a5070}
.tree{position:absolute;bottom:0}
.tree-top{width:20px;height:24px;background:#1a4030;border-radius:50%;border:1px solid #2a5540}
.tree-trunk{width:4px;height:8px;background:#3a2a20;margin:0 auto}
.side-panel{position:absolute;top:0;right:0;width:280px;height:100%;background:rgba(12,16,28,0.95);border-left:1px solid #333a55;transform:translateX(100%);transition:transform 0.3s;z-index:50;overflow-y:auto;backdrop-filter:blur(8px)}
.side-panel.open{transform:translateX(0)}
.panel-header{padding:12px;border-bottom:1px solid #333a55;display:flex;align-items:center;gap:8px}
.panel-close{width:24px;height:24px;border-radius:4px;border:1px solid #333a55;background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;margin-left:auto}
.panel-avatar{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px}
.panel-name{font-size:11px;font-weight:700;letter-spacing:2px}
.panel-role{font-size:9px;color:var(--text2)}
.panel-section{padding:10px 12px;border-bottom:1px solid rgba(51,58,85,0.5)}
.panel-sec-title{font-size:7px;letter-spacing:2px;color:var(--text3);margin-bottom:6px}
.panel-stat{display:flex;justify-content:space-between;font-size:10px;padding:3px 0}
.panel-stat span:last-child{color:var(--cyan)}
.panel-log{font-size:9px;color:var(--text2);padding:4px 0;border-bottom:1px solid rgba(51,58,85,0.3);line-height:1.4}
.hud{position:absolute;top:8px;left:8px;right:8px;display:flex;align-items:center;gap:8px;z-index:30}
.hud-logo{font-size:10px;letter-spacing:3px;color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.3)}
.hud-badge{font-size:7px;padding:2px 6px;border-radius:3px;background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.2);letter-spacing:1px}
.hud-time{margin-left:auto;font-size:9px;color:var(--text2)}
.feed-bar{position:absolute;bottom:0;left:0;right:0;height:80px;background:rgba(12,16,28,0.9);border-top:1px solid #333a55;z-index:30;overflow:hidden;backdrop-filter:blur(8px)}
.feed-title{font-size:7px;letter-spacing:2px;color:var(--text3);padding:6px 10px 4px}
.feed-scroll{padding:0 10px;overflow-y:auto;height:54px}
.feed-msg{font-size:8px;padding:2px 0;color:var(--text2);line-height:1.5;border-bottom:1px solid rgba(51,58,85,0.3)}
.feed-msg b{color:var(--cyan);font-weight:normal}
@media(max-width:420px){.building-wrap{width:340px}.side-panel{width:260px}}
</style>
</head>
<body>
<div class="world" id="world">
  <div class="sky">
    <div class="stars" id="stars"></div>
  </div>
  <div class="hud">
    <span class="hud-logo">CONDUIT AI</span>
    <span class="hud-badge">6 ONLINE</span>
    <span class="hud-time" id="clock">--:--</span>
  </div>
  <div class="building-wrap" id="bldgWrap">
    <div class="building" id="bldg"></div>
  </div>
  <div class="feed-bar">
    <div class="feed-title">LIVE ACTIVITY</div>
    <div class="feed-scroll" id="feed"></div>
  </div>
  <div class="side-panel" id="panel">
    <div class="panel-header">
      <div class="panel-avatar" id="panelAv"></div>
      <div><div class="panel-name" id="panelNm"></div><div class="panel-role" id="panelRl"></div></div>
      <button class="panel-close" onclick="closePanel()">x</button>
    </div>
    <div id="panelBody"></div>
  </div>
</div>
<script>
var FLOORS=[
  {id:'penthouse',label:'F7',dept:'CEO SUITE',agents:[]},
  {id:'boardroom',label:'F6',dept:'BOARDROOM',agents:[]},
  {id:'intel',label:'F5',dept:'INTELLIGENCE',agents:['SCOUT']},
  {id:'content',label:'F4',dept:'CONTENT & SEO',agents:['SAGE']},
  {id:'outbound',label:'F3',dept:'OUTBOUND SALES',agents:['STRIKER']},
  {id:'sales',label:'F2',dept:'PROSPECTING',agents:['HUNTER','CLOSER']},
  {id:'ops',label:'F1',dept:'OPERATIONS',agents:['WATCHDOG']},
];
var AGENTS={
  HUNTER:{icon:'\uD83C\uDFAF',role:'Director of Prospecting',color:'#ff9100',skin:'#d4956a',shirt:'#ff9100',pants:'#4a3a30',actions:['Scraping barbershops in Miami','Found 12 prospects in Fort Lauderdale','Qualifying HVAC companies','Building list for Dallas','Researching nail salons']},
  CLOSER:{icon:'\uD83D\uDCE7',role:'Director of Outreach',color:'#b388ff',skin:'#c48a6a',shirt:'#b388ff',pants:'#3a3050',actions:['Drafting email for barbershop','Personalizing HVAC outreach','Loading leads into Instantly','Writing follow-up','Crafting subject lines']},
  STRIKER:{icon:'\uD83D\uDCDE',role:'Director of Outbound',color:'#00e676',skin:'#8a6a4a',shirt:'#00e676',pants:'#2a3a2a',actions:['Dialing prospect...','Call complete \u2014 warm interest','Prepping call script','Reviewing recordings','Standing by for hours']},
  SCOUT:{icon:'\uD83D\uDD2D',role:'Director of Intelligence',color:'#00e5ff',skin:'#b89a7a',shirt:'#00e5ff',pants:'#2a3040',actions:['Analyzing Smith.ai pricing','Researching Ruby reviews','Comparing competitors','Market size: 2.1M businesses','Studying Nexa complaints']},
  SAGE:{icon:'\u270D\uFE0F',role:'Director of Content',color:'#ffd740',skin:'#d4a07a',shirt:'#ffd740',pants:'#40382a',actions:['Writing AI for Barbershops post','Publishing to GitHub','Checking analytics \u2014 42 visits','Optimizing meta tags','Drafting social post']},
  WATCHDOG:{icon:'\uD83D\uDC15',role:'Director of Operations',color:'#ff4081',skin:'#a07050',shirt:'#ff4081',pants:'#3a2030',actions:['Backend: 200 OK (138ms)','conduitai.io: healthy','Vapi balance: OK','Stripe: checking subs','Supabase: 12ms avg']},
};
var bldg=document.getElementById('bldg');
var feed=document.getElementById('feed');
var agentEls={};

// Stars
var stars=document.getElementById('stars');
for(var i=0;i<60;i++){var s=document.createElement('div');s.className='star';s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*50+'%;opacity:'+(.2+Math.random()*.6)+';width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px';stars.appendChild(s)}

// Build roof
var roof=document.createElement('div');roof.className='roof';
roof.innerHTML='<div class="antenna"></div><div class="roof-sign">CONDUIT AI ENTERPRISES</div>';
bldg.appendChild(roof);

// Build floors
FLOORS.forEach(function(fl){
  var f=document.createElement('div');f.className='floor';
  f.innerHTML='<div class="floor-label">'+fl.label+'</div><div class="dept-label">'+fl.dept+'</div>';
  
  // Add furniture
  var numDesks=fl.agents.length>0?Math.max(fl.agents.length,2):1;
  for(var d=0;d<numDesks;d++){
    var desk=document.createElement('div');desk.className='desk';
    desk.style.left=(40+d*70)+'px';f.appendChild(desk);
    var chair=document.createElement('div');chair.className='chair';
    chair.style.left=(46+d*70)+'px';f.appendChild(chair);
  }
  
  // Windows
  if(fl.id==='penthouse'){
    for(var w=0;w<8;w++){var win=document.createElement('div');win.className='win'+(Math.random()>.3?' lit':'');win.style.cssText='position:absolute;bottom:10px;left:'+(10+w*44)+'px';f.appendChild(win)}
  }
  
  // Add agents
  fl.agents.forEach(function(name,idx){
    var ag=AGENTS[name];
    var el=document.createElement('div');el.className='pixel-agent';
    el.style.left=(35+idx*70)+'px';
    el.onclick=function(){openPanel(name)};
    el.innerHTML='<div class="work-bubble" id="wb-'+name+'"></div>'+
      '<div class="agent-sprite">'+
      '<div class="sp-icon">'+ag.icon+'</div>'+
      '<div class="sp-head" style="background:'+ag.skin+'"></div>'+
      '<div class="sp-body" style="background:'+ag.shirt+'"></div>'+
      '<div class="sp-leg1" style="background:'+ag.pants+'"></div>'+
      '<div class="sp-leg2" style="background:'+ag.pants+'"></div>'+
      '</div>'+
      '<div class="agent-name">'+name+'</div>';
    f.appendChild(el);
    agentEls[name]=el;
  });
  
  bldg.appendChild(f);
  var base=document.createElement('div');base.className='floor-base';bldg.appendChild(base);
});

// Ground floor
var ground=document.createElement('div');ground.className='ground';
ground.innerHTML='<div class="entrance"><div class="entrance-text">ENTRANCE</div><div class="door"></div><div class="door"></div></div><div class="lobby-desk"></div>';
bldg.appendChild(ground);

// Feed
function addFeed(agent,text){
  var t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  var d=document.createElement('div');d.className='feed-msg';
  var ag=AGENTS[agent];
  d.innerHTML=(ag?ag.icon:'\u26A1')+' <b>'+agent+'</b> '+text+' <span style="color:#505868;font-size:7px">'+t+'</span>';
  feed.insertBefore(d,feed.firstChild);
  if(feed.children.length>30)feed.removeChild(feed.lastChild);
}

// Agent work simulation
function doWork(name){
  var ag=AGENTS[name];if(!ag)return;
  var text=ag.actions[Math.floor(Math.random()*ag.actions.length)];
  var wb=document.getElementById('wb-'+name);
  if(wb){wb.textContent=text;wb.style.opacity='1';setTimeout(function(){wb.style.opacity='0'},3000)}
  addFeed(name,text);
  
  // Move agent slightly
  var el=agentEls[name];
  if(el){
    var cur=parseInt(el.style.left)||40;
    var newX=Math.max(20,Math.min(300,cur+(Math.random()*60-30)));
    el.style.left=newX+'px';
  }
}

// Panel
function openPanel(name){
  var ag=AGENTS[name];if(!ag)return;
  document.getElementById('panelAv').textContent=ag.icon;
  document.getElementById('panelAv').style.background='rgba('+hexToRgb(ag.color)+',0.15)';
  document.getElementById('panelAv').style.border='1px solid '+ag.color+'40';
  document.getElementById('panelNm').textContent=name;
  document.getElementById('panelNm').style.color=ag.color;
  document.getElementById('panelRl').textContent=ag.role;
  
  var body='<div class="panel-section"><div class="panel-sec-title">STATUS</div>';
  body+='<div class="panel-stat"><span>Status</span><span style="color:var(--green)">ACTIVE</span></div>';
  body+='<div class="panel-stat"><span>Tasks Today</span><span>'+Math.floor(Math.random()*8+3)+'</span></div>';
  body+='<div class="panel-stat"><span>Department</span><span>'+ag.role.split(' ').pop()+'</span></div>';
  body+='</div>';
  
  body+='<div class="panel-section"><div class="panel-sec-title">RECENT ACTIVITY</div>';
  ag.actions.forEach(function(a){body+='<div class="panel-log">'+ag.icon+' '+a+'</div>'});
  body+='</div>';
  
  document.getElementById('panelBody').innerHTML=body;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){document.getElementById('panel').classList.remove('open')}

function hexToRgb(hex){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return r+','+g+','+b}

// Clock
setInterval(function(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})+' EST'},1000);

// Startup feed
addFeed('SYSTEM','All agents online');
Object.keys(AGENTS).forEach(function(n,i){setTimeout(function(){addFeed(n,'Reporting for duty')},i*300)});

// Run agents
Object.keys(AGENTS).forEach(function(n){
  (function run(){doWork(n);setTimeout(run,4000+Math.random()*8000)})();
});

// Inter-agent chat
var chats=[['HUNTER','CLOSER','Found 8 prospects \u2014 drafting emails'],['WATCHDOG','SCOUT','Systems green, running intel'],['STRIKER','CLOSER','Call done, need follow-up email'],['SAGE','HUNTER','Blog ranking, need more prospects'],['SCOUT','SAGE','Competitors weak on salon content']];
setInterval(function(){var c=chats[Math.floor(Math.random()*chats.length)];addFeed(c[0],c[2])},10000);

// Scroll building into view
setTimeout(function(){document.getElementById('bldgWrap').style.bottom='80px'},100);
</script>
</body>
</html>
